<!-- @dsCard group="Components" viewport="700x500" name="Core Components" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Components</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>
  <style>
    body { padding: 40px; background: var(--color-bg-primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; }
    .section { display: flex; flex-direction: column; gap: 12px; }
    .section-title { font-size: var(--font-size-xs); font-weight: var(--font-weight-bold); text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-quaternary); }
    .demo { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Card, Badge, Input } = window.GarminUI;

    function ComponentDemo() {
      return (
        <div className="grid">
          <div className="section">
            <div className="section-title">Buttons</div>
            <div className="demo">
              <Button variant="primary">Primary</Button>
              <Button variant="secondary">Secondary</Button>
              <Button variant="ghost">Ghost</Button>
              <Button variant="danger">Danger</Button>
            </div>
          </div>

          <div className="section">
            <div className="section-title">Button Sizes</div>
            <div className="demo">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg">Large</Button>
            </div>
          </div>

          <div className="section">
            <div className="section-title">Badges</div>
            <div className="demo">
              <Badge variant="primary">Primary</Badge>
              <Badge variant="success">Success</Badge>
              <Badge variant="warning">Warning</Badge>
              <Badge variant="error">Error</Badge>
            </div>
          </div>

          <div className="section">
            <div className="section-title">Cards</div>
            <div className="demo">
              <Card style={{ width: '100%' }}>
                <p style={{ fontSize: 'var(--font-size-sm)', margin: 0 }}>Card content</p>
              </Card>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ComponentDemo />);
  </script>
</body>
</html>
